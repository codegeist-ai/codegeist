version: '3'

tasks:
  test:
    env:
      OLLAMA_ENTER: 'false'
    desc: Run the Codegeist test suite
    cmds:
      - task: ollama-start
      - mvn --batch-mode --no-transfer-progress {{if .TEST}}-Dtest={{.TEST}} {{end}}test

  build:
    desc: Build the executable Codegeist application jar
    cmds:
      - mvn --batch-mode --no-transfer-progress -DskipTests clean package

  native:
    desc: Build the GraalVM native executable
    cmds:
      - mvn --batch-mode --no-transfer-progress -DskipTests -Pnative clean native:compile

  native-smoke:
    desc: Build the native executable and smoke-test native commands
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/native-smoke.ps1 -BuildNative

  local-linux-smoke:
    desc: Run local Linux build gates and native smoke checks
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/local-linux-smoke.ps1

  mcp-remote-smoke:
    desc: Run Docker-backed remote MCP streamable HTTP smoke
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/mcp-remote-smoke.ps1

  qemu-windows-smoke:
    desc: Create or start the Windows QEMU VM and run native smoke checks
    cmds:
      - bash ../../../scripts/tests/qemu-windows-vm.sh smoke

  final-smoke-suite:
    desc: Run the local Linux and Windows final smoke suite
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/final-smoke-suite.ps1

  ollama-start:
    desc: Start a local Ollama server
    cmds:
      - |
        bash -lc '
          set -euo pipefail

          container_name="${OLLAMA_CONTAINER_NAME:-codegeist-ollama}"
          image="${OLLAMA_IMAGE:-ollama/ollama:latest}"
          models_dir="${OLLAMA_MODELS_DIR:-$HOME/.ollama/models}"
          bind_address="${OLLAMA_BIND_ADDRESS:-127.0.0.1}"
          port="${OLLAMA_PORT:-11434}"
          model="${OLLAMA_MODEL:-llama3.2:1b}"
          enter_mode="${OLLAMA_ENTER:-auto}"
          gpu_mode="${OLLAMA_GPU:-auto}"
          health_host="$bind_address"
          docker_gpu_args=()

          if [ "$health_host" = "0.0.0.0" ]; then
            health_host="127.0.0.1"
          fi

          case "$gpu_mode" in
            true)
              docker_gpu_args=(--gpus all --env NVIDIA_VISIBLE_DEVICES=all --env NVIDIA_DRIVER_CAPABILITIES=compute,utility)
              ;;
            auto)
              case "$(docker info 2>/dev/null || true)" in
                *nvidia*) docker_gpu_args=(--gpus all --env NVIDIA_VISIBLE_DEVICES=all --env NVIDIA_DRIVER_CAPABILITIES=compute,utility) ;;
              esac
              ;;
            false)
              ;;
            *)
              printf "Unsupported OLLAMA_GPU value: %s\n" "$gpu_mode" >&2
              exit 1
              ;;
          esac

          mkdir -p "$models_dir"

          if docker container inspect "$container_name" >/dev/null 2>&1; then
            docker start "$container_name" >/dev/null
          else
            docker run \
              --detach \
              --name "$container_name" \
              "${docker_gpu_args[@]}" \
              --restart unless-stopped \
              --publish "$bind_address:$port:11434" \
              --env OLLAMA_HOST=0.0.0.0:11434 \
              --env OLLAMA_MODELS=/ollama-models \
              --volume "$models_dir:/ollama-models" \
              "$image" >/dev/null
          fi

          for _ in $(seq 1 30); do
            if curl -fsS "http://$health_host:$port/api/version" >/dev/null; then
              if ! docker exec "$container_name" ollama show "$model" >/dev/null 2>&1; then
                printf "Pulling Ollama model %s\n" "$model"
                docker exec "$container_name" ollama pull "$model"
              fi

              printf "Ollama is running at http://%s:%s\n" "$health_host" "$port"
              if [ "$enter_mode" = "true" ] || { [ "$enter_mode" = "auto" ] && [ -t 0 ] && [ -t 1 ]; }; then
                printf "Entering Ollama model %s\n" "$model"
                exec docker exec -it "$container_name" ollama run "$model"
              fi

              printf "Run this to enter Ollama: docker exec -it %s ollama run %s\n" "$container_name" "$model"
              exit 0
            fi
            sleep 1
          done

          docker logs --tail 40 "$container_name" >&2
          exit 1
        '

  run:
    desc: Build and run the Codegeist application
    deps:
      - build
    cmds:
      - java -jar target/codegeist.jar
