version: '3'

tasks:
  test:
    desc: Run the Codegeist test suite
    cmds:
      - mvn --batch-mode --no-transfer-progress test

  build:
    desc: Build the executable Codegeist application jar
    cmds:
      - mvn --batch-mode --no-transfer-progress -DskipTests clean package

  native:
    desc: Build the GraalVM native executable
    cmds:
      - mvn --batch-mode --no-transfer-progress -DskipTests -Pnative clean native:compile

  native-smoke:
    desc: Build the native executable and smoke-test the version command
    deps:
      - native
    cmds:
      - bash -lc 'source ../../../scripts/tests/native-smoke.sh; run-native-smoke-tests'

  local-linux-smoke:
    desc: Run local Linux jar and native smoke checks
    cmds:
      - bash ../../../scripts/tests/local-linux-smoke.sh

  qemu-windows-smoke:
    desc: Create or start the Windows QEMU VM and run jar/native smoke checks
    cmds:
      - bash ../../../scripts/tests/qemu-windows-vm.sh smoke

  final-smoke-suite:
    desc: Run the local Linux and Windows final smoke suite
    cmds:
      - bash ../../../scripts/tests/final-smoke-suite.sh

  run:
    desc: Build and run the Codegeist application
    deps:
      - build
    cmds:
      - java -jar target/codegeist.jar
