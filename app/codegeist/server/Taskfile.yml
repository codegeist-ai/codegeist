version: '3'

tasks:
  test:
    desc: Run the Codegeist server test suite
    cmds:
      - mvn --batch-mode --no-transfer-progress {{if .TEST}}-Dtest={{.TEST}} {{end}}test

  build:
    desc: Build the executable Codegeist server jar
    cmds:
      - mvn --batch-mode --no-transfer-progress -DskipTests clean package

  native:
    desc: Build the GraalVM native Codegeist server executable
    cmds:
      - mvn --batch-mode --no-transfer-progress -DskipTests -Pnative clean native:compile

  native-smoke:
    desc: Build and smoke-test the native Codegeist server executable
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/server-native-smoke.ps1 -BuildNative

  devenv-smoke:
    desc: Run the Docker-backed authentik plus MinIO OIDC/STS storage smoke
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/minio-oidc-storage-smoke.ps1

  devenv-ai-smoke:
    desc: Run the Docker-backed authenticated Envoy AI Gateway to local Ollama smoke
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/envoy-ai-gateway-smoke.ps1

  devenv-up:
    desc: Start the local authentik plus MinIO OIDC/STS Docker environment
    cmds:
      - docker compose --project-name codegeist-minio-oidc --file ../../../scripts/tests/fixtures/minio-oidc-storage/compose.yml up --detach

  devenv-ai-up:
    desc: Start the local authentik, MinIO, Open WebUI, Envoy AI Gateway, and Ollama Docker environment
    cmds:
      - pwsh -NoProfile -File ../../../scripts/tests/envoy-ai-gateway-smoke.ps1 -ProjectName codegeist-minio-oidc -KeepRunning -StartOnly -StartAllServices

  run:
    desc: Build and run the Codegeist server application
    deps:
      - build
    cmds:
      - java -jar target/codegeist-server.jar
