# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
# minio-oidc-smoke.yaml - authentik bootstrap for the MinIO OIDC/STS smoke.
#
# Why this exists:
# - Creates only local fixture identities and an OAuth2/OIDC application used by
#   scripts/tests/minio-oidc-storage-smoke.ps1.
# - The client credentials grant is enabled solely so the smoke can obtain a token
#   with a local fixture app password and without a browser. It is not the product
#   login flow for Codegeist Cloud.
version: 1
metadata:
  name: Codegeist MinIO OIDC smoke
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  - model: authentik_core.user
    identifiers:
      username: codegeist-smoke
    attrs:
      name: Codegeist Smoke User
      email: codegeist-smoke@example.invalid
      is_active: true

  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      managed: codegeist.local/providers/oauth2/scope-minio-policies
    attrs:
      name: Codegeist MinIO smoke policy claim
      scope_name: minio-policies
      description: MinIO policy claim used only by the local Codegeist smoke stack.
      expression: |
        return {
            "minio-policies": "codegeist-artifacts-smoke",
        }

  - model: authentik_providers_oauth2.oauth2provider
    id: minio-smoke-provider
    identifiers:
      name: minio-smoke
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      issuer_mode: global
      client_id: minio-smoke-client
      client_secret: codegeist-smoke-minio-client-secret
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:9003/oauth_callback
          redirect_uri_type: authorization
      grant_types:
        - client_credentials
        - refresh_token
        - authorization_code
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, codegeist.local/providers/oauth2/scope-minio-policies]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]

  - model: authentik_core.application
    identifiers:
      slug: minio-smoke
    attrs:
      name: MinIO OIDC Smoke
      provider: !KeyOf minio-smoke-provider
